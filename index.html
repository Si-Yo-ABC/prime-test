<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elohim.dev License Test (HF Token Auth)</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #0a0f1e;
            color: #e2e8f0;
        }
        .card {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            color: #facc15;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            background: #0f172a;
            padding: 0.75rem;
            border-radius: 0.75rem;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #64748b;
            transition: all 0.2s;
        }
        .status-online {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }
        .status-offline {
            background: #ef4444;
            box-shadow: 0 0 6px #ef4444;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #2563eb;
        }
        button:active {
            transform: scale(0.97);
        }
        .danger-btn {
            background: #ef4444;
        }
        .danger-btn:hover {
            background: #dc2626;
        }
        input, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.6rem;
            border-radius: 0.5rem;
            color: white;
            font-family: monospace;
            margin-top: 0.3rem;
            box-sizing: border-box;
        }
        label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .output {
            background: #0f172a;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 1rem;
            border-left: 3px solid #facc15;
        }
        .flex {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        hr {
            border-color: #334155;
            margin: 1rem 0;
        }
        .warning {
            background: #451a1a;
            border-left: 3px solid #ef4444;
            padding: 0.5rem;
            font-size: 0.75rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🧪 Elohim.dev License Test</h1>
    <p>Mock license server — Hugging Face Space (Token Auth required)</p>

    <!-- API Status Indicator -->
    <div class="status-row">
        <div id="api-status-indicator" class="status-indicator"></div>
        <span id="api-status-text">—</span>
        <span style="flex:1"></span>
        <button id="checkHealthBtn">🔍 Check Health</button>
    </div>

    <!-- Activation section -->
    <label>🔑 Product Key</label>
    <input type="text" id="productKey" placeholder="e.g., DEMO-1234-ABCD" value="DEMO-1234-ABCD">
    
    <label style="margin-top: 0.75rem; display: block;">🖥️ Machine ID (auto-detected)</label>
    <input type="text" id="machineId" readonly placeholder="detecting...">
    
    <div class="flex" style="margin-top: 1rem;">
        <button id="activateBtn">✅ Activate License</button>
        <button id="clearOutputBtn" class="danger-btn" style="background:#334155;">Clear Log</button>
    </div>

    <div class="output" id="outputArea">
        💡 Click "Check Health" first, then enter a product key and click Activate.
    </div>
    <div class="warning">
        ⚠️ Make sure you have set <strong>partB</strong> in the script with your actual Hugging Face token (everything after <code>hf_</code>).
    </div>
</div>

<script>
    
    // --- CONFIGURATION ---
        // We know this works because you tested it in the browser!
        //const API_URL = "https://si-yo-abc-prime-generator-api.hf.space/generate";
        //si-yo-abc/prime-generator-api
        const API_URL = "https://si-yo-abc-prime-generator-api.hf.space"; 
        // We split the token so GitHub doesn't "see" it and kill it
        const partA = "hf_"; 
        const partB = "dIhTAgaiHTPBRDcQBHnBzQHbVfttaGkQdI"; // Paste everything AFTER hf_ here

        const HF_TOKEN = partA + partB; 
    // --------------------- 
        
   // Helper to get a machine ID (browser fingerprint stored in localStorage)
    async function getMachineId() {
        let storedId = localStorage.getItem('elohim_machine_id');
        if (storedId) return storedId;
        
        const fp = `${navigator.userAgent}|${screen.width}x${screen.height}|${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
        let hash = 0;
        for (let i = 0; i < fp.length; i++) {
            hash = ((hash << 5) - hash) + fp.charCodeAt(i);
            hash |= 0;
        }
        const machineId = `browser-${Math.abs(hash).toString(16)}`;
        localStorage.setItem('elohim_machine_id', machineId);
        return machineId;
    }

    function log(message, isError = false) {
        const output = document.getElementById('outputArea');
        const prefix = isError ? '❌ ' : '✅ ';
        output.innerHTML = prefix + message + '\n' + output.innerHTML;
    }

    function clearOutput() {
        document.getElementById('outputArea').innerHTML = '💡 Log cleared.';
    }

    // Check API health (GET /health) – MUST include Bearer token
    async function checkApiStatus() {
        const indicator = document.getElementById('api-status-indicator');
        const statusText = document.getElementById('api-status-text');
        
        try {
            const response = await fetch(`${API_URL}/health`, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${HF_TOKEN}`
                }
            });
            if (response.ok) {
                const data = await response.json();
                indicator.className = 'status-indicator status-online';
                statusText.textContent = 'API Online';
                log(`Health check OK: ${JSON.stringify(data)}`);
            } else {
                indicator.className = 'status-indicator status-offline';
                statusText.textContent = `API Error (${response.status})`;
                log(`Health check failed with status ${response.status}`, true);
                // Optionally read error text
                const text = await response.text();
                if (text) log(`Response: ${text}`, true);
            }
        } catch (error) {
            indicator.className = 'status-indicator status-offline';
            statusText.textContent = 'API Connection Failed';
            log(`Connection error: ${error.message}`, true);
        }
    }

    // Activate license (POST /activate) – MUST include Bearer token
    async function activateLicense() {
        const productKey = document.getElementById('productKey').value.trim();
        if (!productKey) {
            log('Please enter a product key', true);
            return;
        }
        const machineId = document.getElementById('machineId').value;
        if (!machineId) {
            log('Machine ID not ready yet. Wait a moment.', true);
            return;
        }
        
        log(`Sending activation request for key ${productKey}...`);
        try {
            const response = await fetch(`${API_URL}/activate`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${HF_TOKEN}`
                },
                body: JSON.stringify({
                    product_key: productKey,
                    machine_id: machineId
                })
            });
            const data = await response.json();
            if (response.ok) {
                log(`Activation successful! License token: ${data.license_token || 'N/A'}`);
                localStorage.setItem('elohim_license_token', data.license_token);
            } else {
                log(`Activation failed (${response.status}): ${data.detail || JSON.stringify(data)}`, true);
            }
        } catch (error) {
            log(`Activation request error: ${error.message}`, true);
        }
    }

    // Initialize
    (async function init() {
        const machineIdInput = document.getElementById('machineId');
        const id = await getMachineId();
        machineIdInput.value = id;
        log(`Machine ID: ${id}`);
        
        // Optional: auto-check health on page load
        await checkApiStatus();
    })();

    // Wire buttons
    document.getElementById('checkHealthBtn').addEventListener('click', checkApiStatus);
    document.getElementById('activateBtn').addEventListener('click', activateLicense);
    document.getElementById('clearOutputBtn').addEventListener('click', clearOutput);
</script>
</body>
</html>
