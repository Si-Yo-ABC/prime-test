<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goldbach First-Hit Tester (HF Token Auth)</title>
    <style>
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            max-width: 700px;
            margin: 2rem auto;
            padding: 0 1rem;
            background: #0a0f1e;
            color: #e2e8f0;
        }
        .card {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            margin-bottom: 1.5rem;
        }
        h1 {
            font-size: 1.75rem;
            margin-top: 0;
            color: #facc15;
        }
        .status-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            background: #0f172a;
            padding: 0.75rem;
            border-radius: 0.75rem;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #64748b;
            transition: all 0.2s;
        }
        .status-online {
            background: #22c55e;
            box-shadow: 0 0 6px #22c55e;
        }
        .status-offline {
            background: #ef4444;
            box-shadow: 0 0 6px #ef4444;
        }
        button {
            background: #3b82f6;
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: 0.1s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #2563eb;
        }
        button:active {
            transform: scale(0.97);
        }
        .danger-btn {
            background: #ef4444;
        }
        .danger-btn:hover {
            background: #dc2626;
        }
        input, textarea {
            width: 100%;
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.6rem;
            border-radius: 0.5rem;
            color: white;
            font-family: monospace;
            margin-top: 0.3rem;
            box-sizing: border-box;
        }
        label {
            font-weight: 500;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .output {
            background: #0f172a;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-family: monospace;
            font-size: 0.8rem;
            white-space: pre-wrap;
            word-break: break-all;
            margin-top: 1rem;
            border-left: 3px solid #facc15;
            max-height: 400px;
            overflow-y: auto;
        }
        .flex {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
            align-items: center;
        }
        hr {
            border-color: #334155;
            margin: 1rem 0;
        }
        .warning {
            background: #451a1a;
            border-left: 3px solid #ef4444;
            padding: 0.5rem;
            font-size: 0.75rem;
            margin-top: 1rem;
        }
        .success {
            background: #064e3b;
            border-left-color: #22c55e;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🧪 Goldbach First-Hit Tester</h1>
    <p>Direct test of your FastAPI endpoints on Hugging Face (Token Auth required)</p>

    <div class="status-row">
        <div id="api-status-indicator" class="status-indicator"></div>
        <span id="api-status-text">—</span>
        <span style="flex:1"></span>
        <button id="checkHealthBtn">🔍 Check /stats</button>
    </div>

    <label>🔢 Even number (n)</label>
    <input type="number" id="evenNumber" value="100" step="2">
    
    <div class="flex" style="margin-top: 1rem;">
        <button id="computeOneBtn">⚡ Compute & Store (GET /compute_one/{n})</button>
        <button id="fetchHitBtn">📥 Fetch First Hit (GET /experiment/first_hit/{n})</button>
        <button id="clearOutputBtn" class="danger-btn" style="background:#334155;">Clear Log</button>
    </div>

    <div class="output" id="outputArea">
        💡 Click "Check /stats" first. Then enter an even number and click Compute.
    </div>
    <div class="warning">
        ⚠️ Make sure you set your real Hugging Face token in the script below.<br>
        Replace <code>YOUR_HF_TOKEN_HERE</code> with <code>hf_xxxx...</code>.
    </div>
</div>

    <hr>
<div class="flex">
    <button id="resetFirstHitBtn" class="danger-btn">🧹 RESET First-Hit Data (Add new columns & clear)</button>
</div>

<script>
    
    // --- CONFIGURATION ---
        // We know this works because you tested it in the browser!
        //const API_URL = "https://si-yo-abc-prime-generator-api.hf.space/generate";
        //si-yo-abc/prime-generator-api
        const API_URL = "https://si-yo-abc-prime-generator-api.hf.space"; 
        // We split the token so GitHub doesn't "see" it and kill it
        const partA = "hf_"; 
        const partB = "dIhTAgaiHTPBRDcQBHnBzQHbVfttaGkQdI"; // Paste everything AFTER hf_ here

        const HF_TOKEN = partA + partB; 
    // --------------------- 
        
   function log(message, isError = false, isSuccess = false) {
        const output = document.getElementById('outputArea');
        const prefix = isError ? '❌ ' : (isSuccess ? '✅ ' : '📌 ');
        output.innerHTML = prefix + message + '\n' + output.innerHTML;
    }

    function clearOutput() {
        document.getElementById('outputArea').innerHTML = '💡 Log cleared.';
    }

    // Helper: fetch with token and auto-parse JSON
    async function apiGet(path) {
        const url = `${API_URL}${path}`;
        const response = await fetch(url, {
            method: 'GET',
            headers: { 'Authorization': `Bearer ${HF_TOKEN}` }
        });
        let data;
        try {
            data = await response.json();
        } catch(e) {
            data = { error: "Could not parse JSON", raw: await response.text() };
        }
        return { status: response.status, data };
    }

    // Check /stats
    async function checkStats() {
        const indicator = document.getElementById('api-status-indicator');
        const statusText = document.getElementById('api-status-text');
        try {
            const { status, data } = await apiGet('/stats');
            if (status === 200) {
                indicator.className = 'status-indicator status-online';
                statusText.textContent = 'API Online';
                log(`/stats returned: largest_n = ${data.largest_n}, total_processed = ${data.total_processed}`, false, true);
            } else {
                indicator.className = 'status-indicator status-offline';
                statusText.textContent = `Error ${status}`;
                log(`/stats failed with status ${status}: ${JSON.stringify(data)}`, true);
            }
        } catch (err) {
            indicator.className = 'status-indicator status-offline';
            statusText.textContent = 'Connection Failed';
            log(`Network error: ${err.message}`, true);
        }
    }

    // Compute one even number
    async function computeOne() {
        let n = parseInt(document.getElementById('evenNumber').value, 10);
        if (isNaN(n) || n % 2 !== 0 || n <= 2) {
            log("Please enter a valid even number > 2", true);
            return;
        }
        log(`Computing n = ${n} via /compute_one/${n} ...`);
        try {
            const { status, data } = await apiGet(`/compute_one/${n}`);
            if (status === 200) {
                log(`Computed successfully: k_hit_mid = ${data.k_hit_mid}, delta_mid = ${data.delta_mid}`, false, true);
                // Optionally show full response
                log(`Full response: ${JSON.stringify(data, null, 2)}`, false);
            } else {
                log(`Compute failed (${status}): ${JSON.stringify(data)}`, true);
            }
        } catch (err) {
            log(`Request error: ${err.message}`, true);
        }
    }

    // Fetch existing first-hit data
    async function fetchFirstHit() {
        let n = parseInt(document.getElementById('evenNumber').value, 10);
        if (isNaN(n) || n % 2 !== 0) {
            log("Please enter a valid even number", true);
            return;
        }
        log(`Fetching first hit for n = ${n} ...`);
        const { status, data } = await apiGet(`/experiment/first_hit/${n}`);
        if (status === 200) {
            log(`Data found: k_hit_mid = ${data.k_hit_mid}, delta_mid = ${data.delta_mid}`, false, true);
            log(`Full: ${JSON.stringify(data, null, 2)}`, false);
        } else if (status === 404) {
            log(`Not computed yet (404). Use "Compute & Store" first.`, true);
        } else {
            log(`Error ${status}: ${JSON.stringify(data)}`, true);
        }
    }

    async function resetFirstHit() {
    if (!confirm("⚠️ This will DELETE ALL existing first-hit data and add new columns (if missing). Proceed?")) return;
    log("Resetting experiment_first_hit table...");
    try {
        const { status, data } = await apiGet('/reset_first_hit', { method: 'DELETE' });
        if (status === 200) {
            log(`✅ ${data.message}`, false, true);
            checkStats();  // refresh stats display
        } else {
            log(`❌ Reset failed (${status}): ${JSON.stringify(data)}`, true);
        }
    } catch (err) {
        log(`Request error: ${err.message}`, true);
    }
}

    // Wire buttons
    document.getElementById('checkHealthBtn').addEventListener('click', checkStats);
    document.getElementById('computeOneBtn').addEventListener('click', computeOne);
    document.getElementById('fetchHitBtn').addEventListener('click', fetchFirstHit);
    document.getElementById('clearOutputBtn').addEventListener('click', clearOutput);

    // Auto-check stats on page load
    checkStats();
</script>
</body>
</html>
